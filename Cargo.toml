[package]
name = "nats-micro"
version = "0.1.0"
edition = "2024"

[dependencies]
async-nats = { version = "0.46", features = ["service", "jetstream"] }
nats-micro-macros = { path = "../nats-micro-macros" }

tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
futures = "0.3"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
once_cell = "1"
parking_lot = "0.12"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
