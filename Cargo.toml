[package]
name = "nats-micro"
version = "0.1.0"
edition = "2024"

[features]
default = ["encryption", "client"]
client = ["nats-micro-macros/macros_client_feature"]
encryption = [
    "nats-micro-macros/macros_encryption_feature",
    "dep:x25519-dalek",
    "dep:chacha20poly1305",
    "dep:hkdf",
    "dep:sha2",
    "dep:hmac",
    "dep:base64",
    "dep:zeroize",
    "dep:rand",
]

[dependencies]
async-nats = { git = "https://github.com/giddyos/nats.rs.git", features = ["service", "jetstream"] }
inventory = "0.3"
nats-micro-macros = { path = "../nats-micro-macros" }

tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
futures = "0.3"
bytes = "1"
serde = { version = ">=1, <2", features = ["derive"] }
serde_json = ">=1, <2"
prost = ">=0.13, <0.15"
thiserror = "1"
anyhow = "1"
tracing = "0.1"
uuid = { version = "1", features = ["v7", "serde"] }

x25519-dalek     = { version = "2", optional = true, features = ["static_secrets", "zeroize"] }
chacha20poly1305 = { version = "0.10", optional = true }
hkdf             = { version = "0.12", optional = true }
sha2             = { version = "0.10", optional = true }
hmac             = { version = "0.12", optional = true }
base64           = { version = "0.22", optional = true }
zeroize          = { version = "1", optional = true, features = ["derive"] }
rand             = { version = "0.8", optional = true }
tokio-util = "0.7.18"

[dev-dependencies]
trybuild = "1"
rand = "0.8"
